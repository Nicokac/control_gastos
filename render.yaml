services:
  - type: web
    name: control-gastos
    runtime: python
    buildCommand: pip install -r requirements/prod.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: DB_NAME
        fromDatabase:
          name: control-gastos-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: control-gastos-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: control-gastos-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: control-gastos-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: control-gastos-db
          property: port
      - key: BREVO_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: FEEDBACK_EMAIL
        sync: false
    healthCheckPath: /healthz/

databases:
  - name: control-gastos-db
    databaseName: control_gastos_prod
    user: control_gastos_user
    plan: free
