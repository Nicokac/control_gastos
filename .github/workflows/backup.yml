# =============================================================================
# Backup diario de PostgreSQL → Cloudflare R2
# Corre todos los días a las 03:00 UTC (00:00 AR)
# También puede dispararse manualmente desde Actions
# =============================================================================

name: Backup DB

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backup:
    name: 🗄️ Backup PostgreSQL → R2
    runs-on: ubuntu-latest

    steps:
      - name: 🐘 Install pg_dump y rclone
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client rclone

      - name: 🗄️ Run pg_dump
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          DATE=$(date +"%Y-%m-%d_%H-%M-%S")
          pg_dump \
            -h ${{ secrets.DB_HOST }} \
            -p 5432 \
            -U ${{ secrets.DB_USER }} \
            -d ${{ secrets.DB_NAME }} \
            -F c \
            -f backup_${DATE}.dump
          echo "BACKUP_FILE=backup_${DATE}.dump" >> $GITHUB_ENV

      - name: ☁️ Upload a Cloudflare R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          mkdir -p ~/.config/rclone
          printf '[r2]\ntype = s3\nprovider = Cloudflare\naccess_key_id = %s\nsecret_access_key = %s\nendpoint = https://%s.r2.cloudflarestorage.com\n' \
            "${R2_ACCESS_KEY_ID}" "${R2_SECRET_ACCESS_KEY}" "${CF_ACCOUNT_ID}" \
            > ~/.config/rclone/rclone.conf
          echo "--- rclone.conf (keys redacted) ---"
          sed 's/\(access_key_id = \).*/\1[REDACTED]/' ~/.config/rclone/rclone.conf | \
          sed 's/\(secret_access_key = \).*/\1[REDACTED]/'
          echo "--- R2_ACCESS_KEY_ID length: ${#R2_ACCESS_KEY_ID} ---"
          echo "--- CF_ACCOUNT_ID length: ${#CF_ACCOUNT_ID} ---"
          rclone copy ${{ env.BACKUP_FILE }} r2:control-gastos-backups/ -v --s3-no-check-bucket

      - name: ✅ Confirm
        run: |
          SIZE=$(du -sh ${{ env.BACKUP_FILE }} | cut -f1)
          echo "✅ Backup subido a R2: ${{ env.BACKUP_FILE }} (${SIZE})"
