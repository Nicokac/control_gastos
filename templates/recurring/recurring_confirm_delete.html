{% extends 'base.html' %}

{% block title %}Eliminar Gasto Fijo - Control de Gastos{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-trash me-2"></i>Eliminar gasto fijo</h5>
            </div>
            <div class="card-body p-4">
                <p>¿Estás seguro que querés eliminar <strong>{{ object.name }}</strong>?</p>
                <p class="text-muted small">Los gastos ya registrados no se eliminan.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'recurring:list' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Cancelar
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-1"></i>Eliminar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
