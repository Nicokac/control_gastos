{% if user.is_authenticated %}

{# Desktop sidebar (md+) #}
<nav class="sidebar d-none d-md-block" id="appSidebar" aria-label="Navegación lateral">
  <button type="button" class="sidebar-toggle-btn" id="sidebarToggle" aria-label="Contraer menú">
    <i class="bi bi-layout-sidebar-reverse" id="sidebarToggleIcon"></i>
    <span class="ms-2" id="sidebarToggleText">Contraer</span>
  </button>
  <div class="pt-2">
    {% include 'components/sidebar_nav.html' %}
  </div>
</nav>

{# Mobile offcanvas (< md) #}
<div class="offcanvas offcanvas-start d-md-none" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel">
  <div class="offcanvas-header border-bottom">
    <h6 class="offcanvas-title" id="mobileSidebarLabel">
      <i class="bi bi-wallet2 me-2" aria-hidden="true"></i>Control de Gastos
    </h6>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
  </div>
  <div class="offcanvas-body p-0">
    {% include 'components/sidebar_nav.html' with nav_prefix="mobile" %}
  </div>
</div>

{% endif %}
