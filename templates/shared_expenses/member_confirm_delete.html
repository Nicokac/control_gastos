{% extends 'base.html' %}

{% block title %}Eliminar Miembro - Control de Gastos{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4 text-center">
                <i class="bi bi-person-x text-danger fs-1 mb-3 d-block"></i>
                <h5 class="mb-2">¿Eliminar a {{ object.name }}?</h5>
                <p class="text-muted mb-4 small">
                    Los gastos que registró seguirán existiendo pero quedarán sin pagador asignado.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'shared_expenses:members' %}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-danger">Eliminar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
