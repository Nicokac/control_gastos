{% extends 'base.html' %}

{% block title %}Agregar Miembro - Control de Gastos{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="d-flex align-items-center gap-2 mb-4">
            <i class="bi bi-person-plus fs-4 text-primary"></i>
            <h1 class="h4 mb-0">Agregar miembro al hogar</h1>
        </div>
        <div class="card">
            <div class="card-body p-4">
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Nombre</label>
                        {{ form.name }}
                        {% if form.name.errors %}<div class="invalid-feedback d-block">{{ form.name.errors.0 }}</div>{% endif %}
                        <div class="form-text">Ej: Pedro, Mamá, Compañero de depto.</div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'shared_expenses:members' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Agregar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
