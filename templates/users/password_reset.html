{% extends 'base.html' %}

{% block title %}Recuperar Contraseña - Control de Gastos{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="auth-logo mb-3">
                        <i class="bi bi-wallet2"></i>
                    </div>
                    <h1 class="h4 fw-bold">Recuperar contraseña</h1>
                    <p class="text-muted">Ingresá tu email y te enviamos un link para resetearla</p>
                </div>

                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="id_email" class="form-label">
                            <i class="bi bi-envelope me-1"></i>Email
                        </label>
                        <input type="email"
                               name="email"
                               id="id_email"
                               class="form-control"
                               placeholder="tu@email.com"
                               autofocus
                               required>
                    </div>

                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-send me-2"></i>Enviar link
                        </button>
                    </div>
                </form>

                <div class="text-center">
                    <a href="{% url 'users:login' %}" class="text-muted small">
                        <i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesión
                    </a>
                </div>
            </div>
        </div>

        <p class="text-center text-muted mt-4 small">
            Control de Gastos &copy; {% now "Y" %}
        </p>
    </div>
</div>
{% endblock %}
