{% extends 'base.html' %}

{% block title %}Contraseña actualizada - Control de Gastos{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5 text-center">
                <div class="auth-logo mb-3">
                    <i class="bi bi-check-circle"></i>
                </div>
                <h1 class="h4 fw-bold mb-3">¡Contraseña actualizada!</h1>
                <p class="text-muted mb-4">
                    Tu contraseña fue cambiada correctamente. Ya podés iniciar sesión.
                </p>
                <a href="{% url 'users:login' %}" class="btn btn-primary btn-lg">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
                </a>
            </div>
        </div>

        <p class="text-center text-muted mt-4 small">
            Control de Gastos &copy; {% now "Y" %}
        </p>
    </div>
</div>
{% endblock %}
